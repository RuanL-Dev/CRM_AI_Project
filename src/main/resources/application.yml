spring:
  application:
    name: crm-n8n-java
  datasource:
    url: ${CRM_DATASOURCE_URL}
    username: ${CRM_DATASOURCE_USERNAME}
    password: ${CRM_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
      timeout: 30m

n8n:
  webhook-url: ${N8N_WEBHOOK_URL:}
  connect-timeout-ms: ${N8N_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${N8N_READ_TIMEOUT_MS:5000}
  retry-delay-ms: ${N8N_RETRY_DELAY_MS:30000}
  retry-scheduler-delay-ms: ${N8N_RETRY_SCHEDULER_DELAY_MS:30000}
  max-attempts: ${N8N_MAX_ATTEMPTS:5}

app:
  seed-demo-data:
    enabled: false
  security:
    bootstrap-enabled: ${CRM_BOOTSTRAP_ENABLED:false}
    username: ${CRM_USERNAME:}
    password: ${CRM_PASSWORD:}
    dev-h2-console-enabled: false
    password-policy:
      min-length: 12
    login-rate-limit:
      enabled: true
      max-failures: 5
      window: 15m
      lockout: 15m
