spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:crmdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update

app:
  security:
    dev-h2-console-enabled: true
