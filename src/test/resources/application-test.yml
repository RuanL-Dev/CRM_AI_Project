spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  seed-demo-data:
    enabled: false
  security:
    bootstrap-enabled: true
    username: test-user
    password: test-password
    dev-h2-console-enabled: false

n8n:
  webhook-url:
  connect-timeout-ms: 1000
  read-timeout-ms: 1000
  retry-delay-ms: 100
  retry-scheduler-delay-ms: 1000
  max-attempts: 2
