name: Deploy CRM To Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and verify application
        run: mvn verify

      - name: Prepare deployment environment file
        shell: bash
        env:
          CRM_POSTGRES_DB: ${{ secrets.CRM_POSTGRES_DB }}
          CRM_POSTGRES_USER: ${{ secrets.CRM_POSTGRES_USER }}
          CRM_POSTGRES_PASSWORD: ${{ secrets.CRM_POSTGRES_PASSWORD }}
          CRM_APP_PROFILE: ${{ secrets.CRM_APP_PROFILE }}
          CRM_APP_USERNAME: ${{ secrets.CRM_APP_USERNAME }}
          CRM_APP_PASSWORD: ${{ secrets.CRM_APP_PASSWORD }}
          CRM_BOOTSTRAP_ENABLED: ${{ secrets.CRM_BOOTSTRAP_ENABLED }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          N8N_CONNECT_TIMEOUT_MS: ${{ secrets.N8N_CONNECT_TIMEOUT_MS }}
          N8N_READ_TIMEOUT_MS: ${{ secrets.N8N_READ_TIMEOUT_MS }}
          N8N_RETRY_DELAY_MS: ${{ secrets.N8N_RETRY_DELAY_MS }}
          N8N_RETRY_SCHEDULER_DELAY_MS: ${{ secrets.N8N_RETRY_SCHEDULER_DELAY_MS }}
          N8N_MAX_ATTEMPTS: ${{ secrets.N8N_MAX_ATTEMPTS }}
        run: |
          umask 077
          weak_values=(
            admin
            change-me
            change-me-now
            password
            123456
            12345678
            crm_app
            crm_app_password
          )

          validate_secret() {
            local name="$1"
            local value="$2"
            local related_identifier="${3:-}"

            if [ -z "${value}" ]; then
              echo "Missing required GitHub secret: ${name}" >&2
              exit 1
            fi

            if [ "${#value}" -lt 12 ]; then
              echo "${name} must have at least 12 characters for production runtime." >&2
              exit 1
            fi

            local lowered
            lowered="$(printf '%s' "${value}" | tr '[:upper:]' '[:lower:]')"
            for weak_value in "${weak_values[@]}"; do
              if [ "${lowered}" = "${weak_value}" ]; then
                echo "${name} uses a blocked weak default value." >&2
                exit 1
              fi
            done

            if [ -n "${related_identifier}" ] && [ "${lowered}" = "$(printf '%s' "${related_identifier}" | tr '[:upper:]' '[:lower:]')" ]; then
              echo "${name} must not match its paired username." >&2
              exit 1
            fi
          }

          required_vars=(
            CRM_POSTGRES_DB
            CRM_POSTGRES_USER
            CRM_POSTGRES_PASSWORD
            CRM_APP_PROFILE
            CRM_APP_USERNAME
            CRM_APP_PASSWORD
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub secret: ${var_name}" >&2
              exit 1
            fi
          done
          if [ "${CRM_APP_PROFILE}" = "dev" ]; then
            echo "CRM_APP_PROFILE must not be 'dev' in production deploys." >&2
            exit 1
          fi

          validate_secret "CRM_POSTGRES_PASSWORD" "${CRM_POSTGRES_PASSWORD}" "${CRM_POSTGRES_USER}"
          validate_secret "CRM_APP_PASSWORD" "${CRM_APP_PASSWORD}" "${CRM_APP_USERNAME}"

          {
            echo "CRM_POSTGRES_DB=${CRM_POSTGRES_DB}"
            echo "CRM_POSTGRES_USER=${CRM_POSTGRES_USER}"
            echo "CRM_POSTGRES_PASSWORD=${CRM_POSTGRES_PASSWORD}"
            echo "CRM_APP_PROFILE=${CRM_APP_PROFILE}"
            echo "CRM_APP_USERNAME=${CRM_APP_USERNAME}"
            echo "CRM_APP_PASSWORD=${CRM_APP_PASSWORD}"
            echo "CRM_BOOTSTRAP_ENABLED=${CRM_BOOTSTRAP_ENABLED:-true}"
            echo "N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}"
            echo "N8N_CONNECT_TIMEOUT_MS=${N8N_CONNECT_TIMEOUT_MS:-2000}"
            echo "N8N_READ_TIMEOUT_MS=${N8N_READ_TIMEOUT_MS:-5000}"
            echo "N8N_RETRY_DELAY_MS=${N8N_RETRY_DELAY_MS:-30000}"
            echo "N8N_RETRY_SCHEDULER_DELAY_MS=${N8N_RETRY_SCHEDULER_DELAY_MS:-30000}"
            echo "N8N_MAX_ATTEMPTS=${N8N_MAX_ATTEMPTS:-5}"
          } > deploy/.env.production
          chmod 600 deploy/.env.production

      - name: Generate artifact checksum
        shell: bash
        run: sha256sum target/crm-n8n-java-0.1.0.jar > target/crm-n8n-java-0.1.0.jar.sha256

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CRM_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Register production host key
        shell: bash
        env:
          CRM_DEPLOY_KNOWN_HOSTS: ${{ secrets.CRM_DEPLOY_KNOWN_HOSTS }}
        run: |
          if [ -z "${CRM_DEPLOY_KNOWN_HOSTS}" ]; then
            echo "Missing required GitHub secret: CRM_DEPLOY_KNOWN_HOSTS" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${CRM_DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload artifact and deploy assets
        shell: bash
        env:
          CRM_DEPLOY_HOST: ${{ secrets.CRM_DEPLOY_HOST }}
          CRM_DEPLOY_PORT: ${{ secrets.CRM_DEPLOY_PORT }}
          CRM_DEPLOY_USER: ${{ secrets.CRM_DEPLOY_USER }}
          CRM_DEPLOY_PATH: ${{ secrets.CRM_DEPLOY_PATH }}
        run: |
          if [ -z "${CRM_DEPLOY_HOST}" ] || [ -z "${CRM_DEPLOY_USER}" ] || [ -z "${CRM_DEPLOY_PATH}" ]; then
            echo "Missing required deploy target secrets." >&2
            exit 1
          fi

          DEPLOY_PORT="${CRM_DEPLOY_PORT:-22}"

          ssh -p "${DEPLOY_PORT}" "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}" "mkdir -p '${CRM_DEPLOY_PATH}'"

          scp -P "${DEPLOY_PORT}" target/crm-n8n-java-0.1.0.jar "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}:${CRM_DEPLOY_PATH}/crm-n8n-java-0.1.0.jar"
          scp -P "${DEPLOY_PORT}" target/crm-n8n-java-0.1.0.jar.sha256 "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}:${CRM_DEPLOY_PATH}/crm-n8n-java-0.1.0.jar.sha256"
          scp -P "${DEPLOY_PORT}" deploy/docker-compose.yml "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}:${CRM_DEPLOY_PATH}/docker-compose.yml"
          scp -P "${DEPLOY_PORT}" deploy/Caddyfile "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}:${CRM_DEPLOY_PATH}/Caddyfile"
          scp -P "${DEPLOY_PORT}" deploy/README.md "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}:${CRM_DEPLOY_PATH}/README.md"
          scp -P "${DEPLOY_PORT}" deploy/.env.production "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}:${CRM_DEPLOY_PATH}/.env"
          ssh -p "${DEPLOY_PORT}" "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}" "chmod 600 '${CRM_DEPLOY_PATH}/.env'"

      - name: Restart production stack
        shell: bash
        env:
          CRM_DEPLOY_HOST: ${{ secrets.CRM_DEPLOY_HOST }}
          CRM_DEPLOY_PORT: ${{ secrets.CRM_DEPLOY_PORT }}
          CRM_DEPLOY_USER: ${{ secrets.CRM_DEPLOY_USER }}
          CRM_DEPLOY_PATH: ${{ secrets.CRM_DEPLOY_PATH }}
        run: |
          DEPLOY_PORT="${CRM_DEPLOY_PORT:-22}"
          ssh -p "${DEPLOY_PORT}" "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}" "
            cd '${CRM_DEPLOY_PATH}' &&
            sha256sum -c crm-n8n-java-0.1.0.jar.sha256 &&
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            else
              COMPOSE_CMD='docker-compose'
            fi &&
            \$COMPOSE_CMD up -d --force-recreate crm-postgres crm-app &&
            \$COMPOSE_CMD ps
          "

      - name: Wait for upstream application
        shell: bash
        env:
          CRM_DEPLOY_HOST: ${{ secrets.CRM_DEPLOY_HOST }}
          CRM_DEPLOY_PORT: ${{ secrets.CRM_DEPLOY_PORT }}
          CRM_DEPLOY_USER: ${{ secrets.CRM_DEPLOY_USER }}
        run: |
          DEPLOY_PORT="${CRM_DEPLOY_PORT:-22}"
          ssh -p "${DEPLOY_PORT}" "${CRM_DEPLOY_USER}@${CRM_DEPLOY_HOST}" '
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            for attempt in $(seq 1 48); do
              if curl --fail --silent http://127.0.0.1:8081/healthz | grep -q '"status":"ok"'; then
                exit 0
              fi
              if [ "$attempt" -eq 1 ] || [ $((attempt % 12)) -eq 0 ]; then
                $COMPOSE_CMD ps
              fi
              sleep 5
            done

            $COMPOSE_CMD ps >&2
            $COMPOSE_CMD logs --tail=200 crm-postgres crm-app >&2
            echo "Application did not become ready on http://127.0.0.1:8081/login" >&2
            exit 1
          '

      - name: Validate login endpoint
        shell: bash
        env:
          CRM_PUBLIC_LOGIN_URL: ${{ secrets.CRM_PUBLIC_LOGIN_URL }}
        run: |
          if [ -z "${CRM_PUBLIC_LOGIN_URL}" ]; then
            echo "Missing required GitHub secret: CRM_PUBLIC_LOGIN_URL" >&2
            exit 1
          fi
          for attempt in $(seq 1 24); do
            if curl --fail --show-error --silent --location "${CRM_PUBLIC_LOGIN_URL}" | grep -q "Entrar | Painel Comercial"; then
              exit 0
            fi
            sleep 5
          done
          echo "Public login endpoint did not become ready: ${CRM_PUBLIC_LOGIN_URL}" >&2
          exit 1

      - name: Remove generated production env file
        if: always()
        run: rm -f deploy/.env.production
